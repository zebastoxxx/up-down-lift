<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Up & Down Solar — Fleet Management</title>
    <meta name="description" content="Heavy machinery fleet management system for rental equipment, inspections, and maintenance tracking. Powered by God.">
    <meta name="author" content="Up & Down Solar" />
    <meta name="keywords" content="fleet management, equipment rental, heavy machinery, inspections, maintenance, PWA">
    
    <!-- Google Fonts: Barlow Condensed + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D4881E">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UpDown Solar">
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Up & Down Solar — Fleet Management">
    <meta property="og:description" content="Heavy machinery fleet management system. Powered by God.">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Up & Down Solar">
    <meta name="twitter:description" content="Heavy machinery fleet management system. Powered by God.">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
